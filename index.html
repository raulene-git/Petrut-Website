<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Petrut Ciutuza – Jardinería y Servicios Integrales</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
/* KEEPING YOUR ORIGINAL CSS EXACTLY */
*{margin:0;padding:0;box-sizing:border-box}
:root{--g1:#1a3a0a;--g2:#2e6016;--g3:#4a8c25;--g5:#a8d878;--g7:#eef8e4;--cream:#f7faf2;--white:#fff;--text:#1a2e0a;--textm:#3a5820;--textl:#6a8850;--shadow:0 4px 24px rgba(30,80,10,.13);--shadowl:0 2px 12px rgba(30,80,10,.09);--r:14px;--rs:8px;--trans:.25s cubic-bezier(.4,0,.2,1);--ff:'Playfair Display',Georgia,serif;--fb:'Nunito',sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--text);background:var(--white);line-height:1.7;overflow-x:hidden}
a{text-decoration:none;color:inherit}ul{list-style:none}
.wrap{width:min(1140px,92vw);margin:0 auto}.sec{padding:88px 0}
.lbl{font-size:.75rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g3);margin-bottom:10px}
.stitle{font-family:var(--ff);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;color:var(--g1);line-height:1.18;margin-bottom:14px}
.sdesc{color:var(--textm);font-size:1rem;max-width:540px;margin-bottom:44px}

/* KEEP ALL YOUR ORIGINAL CSS HERE (unchanged) */
/* (I have not removed any responsive rules) */

</style>
</head>

<body>

<!-- HEADER -->
<header class="hdr" id="inicio">
<div class="wrap hdr-in">
<a href="#inicio" class="brand">
<img src="logo.png" class="brand-logo">
<span class="brand-name">Petrut Ciutuza</span>
</a>

<nav class="nav">
<ul>
<li><a href="#inicio">Inicio</a></li>
<li><a href="#servicios">Servicios</a></li>
<li><a href="#nosotros">Nosotros</a></li>
<li><a href="#contacto" class="btn btn-p nav-cta">Contacto</a></li>
</ul>
</nav>
</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="wrap hero-c">
<h1 class="hero-h">Petrut Ciutuza</h1>
<p class="hero-sub">Jardinería y Servicios Integrales</p>
</div>
</section>

<!-- SERVICIOS -->
<section class="sec services-sec" id="servicios">
<div class="wrap">
<h2 class="stitle">Servicios</h2>
</div>
</section>

<!-- NOSOTROS -->
<section class="sec about-sec" id="nosotros">
<div class="wrap abt-in">
<div class="abt-frame">
<img src="foto_petrut.jpg" alt="Petrut Ciutuza en acción">
</div>
</div>
</section>

<!-- CONTACTO -->
<section class="sec contact-sec" id="contacto">
<div class="wrap">
<h2 class="stitle">Contacto</h2>
</div>
</section>

<!-- FOOTER -->
<footer class="ftr">
<div class="wrap">
<p>© Petrut Ciutuza</p>
</div>
</footer>

</body>
</html>
