<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Petrut Ciutuza – Jardinería y Servicios Integrales</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g1:#1a3a0a;--g2:#2e6016;--g3:#4a8c25;--g5:#a8d878;--g7:#eef8e4;--cream:#f7faf2;--white:#fff;--text:#1a2e0a;--textm:#3a5820;--textl:#6a8850;--shadow:0 4px 24px rgba(30,80,10,.13);--shadowl:0 2px 12px rgba(30,80,10,.09);--r:14px;--rs:8px;--trans:.25s cubic-bezier(.4,0,.2,1);--ff:'Playfair Display',Georgia,serif;--fb:'Nunito',sans-serif}
html{scroll-behavior:smooth}body{font-family:var(--fb);color:var(--text);background:var(--white);line-height:1.7;overflow-x:hidden}
a{text-decoration:none;color:inherit}ul{list-style:none}
.wrap{width:min(1140px,92vw);margin:0 auto}.sec{padding:88px 0}
.lbl{font-size:.75rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g3);margin-bottom:10px}
.stitle{font-family:var(--ff);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;color:var(--g1);line-height:1.18;margin-bottom:14px}
.sdesc{color:var(--textm);font-size:1rem;max-width:540px;margin-bottom:44px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;border-radius:50px;font-family:var(--fb);font-size:.92rem;font-weight:700;cursor:pointer;transition:var(--trans);border:2px solid transparent;white-space:nowrap}
.btn-p{background:var(--g2);color:var(--white);box-shadow:0 4px 18px rgba(46,96,22,.35)}.btn-p:hover{background:var(--g1);transform:translateY(-2px)}
.btn-o{border-color:rgba(255,255,255,.7);color:var(--white)}.btn-o:hover{background:rgba(255,255,255,.15);border-color:var(--white)}
.btn-w{background:#25d366;color:var(--white)}.btn-w:hover{background:#1abe5c;transform:translateY(-2px)}
.fw{width:100%;justify-content:center}
.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 0;transition:var(--trans)}
.hdr.scrolled{background:rgba(255,255,255,.97);padding:10px 0;box-shadow:0 2px 16px rgba(30,80,10,.10)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:54px;height:54px;border-radius:50%;object-fit:contain;background:var(--white);box-shadow:var(--shadowl);transition:var(--trans)}
.hdr.scrolled .brand-logo{width:44px;height:44px}
.brand-name{font-family:var(--ff);font-size:1.25rem;font-weight:900;color:var(--white);line-height:1.1;transition:var(--trans)}
.hdr.scrolled .brand-name{color:var(--g1)}
.brand-tag{font-size:.68rem;font-weight:300;letter-spacing:.07em;color:rgba(255,255,255,.78);transition:var(--trans)}
.hdr.scrolled .brand-tag{color:var(--textl)}
.nav ul{display:flex;align-items:center;gap:4px}
.nav a{font-size:.88rem;font-weight:600;color:rgba(255,255,255,.9);padding:8px 14px;border-radius:50px;transition:var(--trans)}
.nav a:hover{background:rgba(255,255,255,.18)}.hdr.scrolled .nav a{color:var(--textm)}.hdr.scrolled .nav a:hover{background:var(--g7);color:var(--g1)}
.nav-cta{background:var(--white)!important;color:var(--g1)!important}.hdr.scrolled .nav-cta{background:var(--g2)!important;color:var(--white)!important}
.hbtn{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px}
.hbtn span{width:24px;height:2px;background:var(--white);border-radius:2px;transition:var(--trans);display:block}
.hdr.scrolled .hbtn span{background:var(--g1)}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:linear-gradient(145deg,var(--g1) 0%,#122808 38%,#2a5510 68%,var(--g3) 100%)}
.hero-c{position:relative;z-index:1;padding-top:110px;padding-bottom:80px;max-width:660px}
.services-sec{background:var(--cream)}
.srv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.about-sec{background:var(--white)}
.contact-sec{background:linear-gradient(158deg,var(--g1) 0%,#1c480e 100%)}
.ftr{background:#111e08;padding:60px 0 0}
</style>
</head>
<body>

<header class="hdr" id="inicio">
<nav>
<a href="#inicio">Inicio</a>
<a href="#servicios">Servicios</a>
<a href="#nosotros">Nosotros</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section class="hero">
<div class="wrap hero-c">
<h1>Petrut Ciutuza</h1>
<p>Jardinería y Servicios Integrales</p>
</div>
</section>

<section id="servicios">
<h2>Servicios</h2>
</section>

<section id="nosotros">
<h2>Nosotros</h2>
<img src="foto_petrut.jpg" alt="Petrut Ciutuza en acción"/>
</section>

<section id="contacto">
<h2>Contacto</h2>
</section>

<footer class="ftr">
<p>© Petrut Ciutuza</p>
</footer>

</body>
</html>
